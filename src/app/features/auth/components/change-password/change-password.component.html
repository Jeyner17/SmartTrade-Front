<!-- Overlay al guardar -->
<div *ngIf="isSaving" class="saving-overlay">
  <div class="spinner-border text-primary" role="status"></div>
  <span class="ms-3 text-primary fw-semibold">Guardando...</span>
</div>

<!-- HEADER -->
<div class="d-flex align-items-center mb-4">
  <div>
    <h2 class="mb-1">
      <i class="bi bi-key text-primary me-2"></i>
      Cambiar Contraseña
    </h2>
    <p class="text-muted mb-0">
      Actualice su contraseña de acceso al sistema
    </p>
  </div>
</div>

<!-- CARD PRINCIPAL -->
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card">
      <div class="card-body p-4">

        <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

          <!-- Contraseña actual -->
          <div class="mb-4">
            <label for="currentPassword" class="form-label">
              Contraseña actual <span class="text-danger">*</span>
            </label>
            <div class="input-group">
              <input
                [type]="showCurrent ? 'text' : 'password'"
                class="form-control"
                id="currentPassword"
                formControlName="currentPassword"
                [class.is-invalid]="isInvalid('currentPassword')"
                placeholder="Ingrese su contraseña actual"
                autocomplete="current-password">
              <button class="btn btn-outline-secondary" type="button"
                (click)="showCurrent = !showCurrent"
                [title]="showCurrent ? 'Ocultar' : 'Mostrar'">
                <i [class]="showCurrent ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
              <div class="invalid-feedback">{{ getError('currentPassword') }}</div>
            </div>
          </div>

          <hr class="my-4">

          <!-- Nueva contraseña -->
          <div class="mb-4">
            <label for="newPassword" class="form-label">
              Nueva contraseña <span class="text-danger">*</span>
            </label>
            <div class="input-group">
              <input
                [type]="showNew ? 'text' : 'password'"
                class="form-control"
                id="newPassword"
                formControlName="newPassword"
                [class.is-invalid]="isInvalid('newPassword')"
                placeholder="Mínimo 8 caracteres"
                autocomplete="new-password">
              <button class="btn btn-outline-secondary" type="button"
                (click)="showNew = !showNew"
                [title]="showNew ? 'Ocultar' : 'Mostrar'">
                <i [class]="showNew ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
              <div class="invalid-feedback">{{ getError('newPassword') }}</div>
            </div>
            <div class="form-text">
              <i class="bi bi-info-circle me-1"></i>
              Mínimo 8 caracteres
            </div>
          </div>

          <!-- Confirmar nueva contraseña -->
          <div class="mb-4">
            <label for="confirmPassword" class="form-label">
              Confirmar nueva contraseña <span class="text-danger">*</span>
            </label>
            <div class="input-group">
              <input
                [type]="showConfirm ? 'text' : 'password'"
                class="form-control"
                id="confirmPassword"
                formControlName="confirmPassword"
                [class.is-invalid]="confirmInvalid"
                placeholder="Repita la nueva contraseña"
                autocomplete="new-password">
              <button class="btn btn-outline-secondary" type="button"
                (click)="showConfirm = !showConfirm"
                [title]="showConfirm ? 'Ocultar' : 'Mostrar'">
                <i [class]="showConfirm ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
              <div class="invalid-feedback">{{ confirmError }}</div>
            </div>
          </div>

          <!-- Aviso de cierre de sesión -->
          <div class="alert alert-info d-flex align-items-center py-2 mb-4" role="alert">
            <i class="bi bi-shield-check me-2 flex-shrink-0"></i>
            <small>Por seguridad, al cambiar la contraseña se cerrará la sesión automáticamente.</small>
          </div>

          <!-- Botón submit -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg" [disabled]="isSaving">
              <i class="bi bi-check-circle me-2"></i>
              <span *ngIf="!isSaving">Actualizar Contraseña</span>
              <span *ngIf="isSaving">
                <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                Guardando...
              </span>
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>
