<!-- Modal 4: Registrar Egreso -->
<div class="modal-backdrop fade show" style="z-index:1040;"></div>
<div class="modal fade show d-block" style="z-index:1050;" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-arrow-up-circle text-danger me-2"></i>Registrar Egreso
        </h5>
        <button type="button" class="btn-close" (click)="cancel()"></button>
      </div>

      <form [formGroup]="form" (ngSubmit)="register()">
        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label fw-semibold">Monto del Egreso *</label>
            <div class="input-group">
              <span class="input-group-text fw-bold">$</span>
              <input type="number" class="form-control form-control-lg fw-bold"
                formControlName="amount" min="0.01" step="0.01" placeholder="0.00"/>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Concepto *</label>
            <select class="form-select" formControlName="concept">
              <option *ngFor="let c of concepts" [value]="c.value">{{ c.label }}</option>
            </select>
          </div>

          <div class="mb-3" *ngIf="showCustomConcept">
            <label class="form-label fw-semibold">Descripción detallada *</label>
            <input type="text" class="form-control" formControlName="customConcept"
              placeholder="Describa el egreso..."/>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">
              N° Comprobante <small class="text-muted fw-normal">(opcional)</small>
            </label>
            <input type="text" class="form-control" formControlName="voucherNumber"
              placeholder="N° ticket o factura"/>
          </div>

          <!-- Autorización de supervisor -->
          <div class="alert alert-warning" *ngIf="requiresAuth">
            <div class="fw-semibold mb-2">
              <i class="bi bi-shield-exclamation me-1"></i>
              Autorización requerida — montos mayores a ${{ authLimit }}
            </div>
            <div class="mb-2">
              <label class="form-label fw-semibold">ID del supervisor *</label>
              <input type="number" class="form-control" formControlName="authorizedBy"
                placeholder="ID del supervisor"/>
            </div>
            <div>
              <label class="form-label fw-semibold">Contraseña del supervisor *</label>
              <input type="password" class="form-control" formControlName="supervisorPassword"
                placeholder="••••••"/>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">
              Observaciones <small class="text-muted fw-normal">(opcional)</small>
            </label>
            <textarea class="form-control" formControlName="observations"
              rows="2" placeholder="Notas adicionales..."></textarea>
          </div>

          <div class="alert alert-danger d-flex justify-content-between align-items-center py-2 mb-0">
            <small class="fw-semibold">Nuevo total esperado en caja:</small>
            <strong>{{ newTotal | currency:'$':'symbol':'1.2-2' }}</strong>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="cancel()">
            <i class="bi bi-x-circle me-1"></i>Cancelar
          </button>
          <button type="submit" class="btn btn-danger" [disabled]="form.invalid || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span>
            <i *ngIf="!isLoading" class="bi bi-check-circle me-1"></i>
            {{ isLoading ? 'Registrando...' : 'Registrar Egreso' }}
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
