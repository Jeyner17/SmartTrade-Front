<div *ngIf="visible && order" class="modal fade show d-block" tabindex="-1" style="background: rgba(0, 0, 0, 0.5)">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-danger">
      <div class="modal-header">
        <h5 class="modal-title text-danger">
          <i class="bi bi-x-octagon me-2"></i>Cancelar Orden
        </h5>
        <button type="button" class="btn-close" (click)="onClose()"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3 small">
          <div><span class="text-muted">N° Orden:</span> <span class="fw-semibold">{{ order.orderNumber }}</span></div>
          <div><span class="text-muted">Proveedor:</span> {{ order.supplier?.tradeName || '—' }}</div>
          <div><span class="text-muted">Monto:</span> {{ order.totalAmount | currency:'$' }}</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Motivo de cancelación <span class="text-danger">*</span></label>
          <select class="form-select" [(ngModel)]="selectedReason">
            <option value="">Seleccione un motivo</option>
            <option *ngFor="let option of reasonOptions" [value]="option.value">{{ option.label }}</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Explicación detallada</label>
          <textarea class="form-control" rows="3" [(ngModel)]="details" placeholder="Detalle adicional"></textarea>
        </div>

        <div class="alert alert-danger py-2 mb-0">
          <i class="bi bi-exclamation-triangle me-2"></i>Esta acción no se puede deshacer.
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="onClose()" [disabled]="isSaving">No cancelar</button>
        <button class="btn btn-danger" (click)="onConfirm()" [disabled]="isSaving || !selectedReason">
          <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
          Confirmar Cancelación
        </button>
      </div>
    </div>
  </div>
</div>
